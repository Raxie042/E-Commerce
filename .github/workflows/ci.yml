name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend:
    name: Backend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore backend/src/Marketplace.Api/Marketplace.Api.csproj

      - name: Build
        run: >
          dotnet build backend/src/Marketplace.Api/Marketplace.Api.csproj
          --no-restore --nologo -c Release

  frontend:
    name: Frontend type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci
        working-directory: frontend

      - name: Type-check
        run: npx tsc --noEmit
        working-directory: frontend

  docker-backend:
    name: Backend Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: marketplace-api:ci

  docker-frontend:
    name: Frontend Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: marketplace-frontend:ci
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:5000
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=pk_test_placeholder
